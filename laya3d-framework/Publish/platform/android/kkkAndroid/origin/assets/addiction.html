<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>防沉迷提示</title>
    <meta name="format-detection" content="telephone=no" />
    <meta name="viewport" content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="applicable-device" content="mobile" />
    <style>
        body,
        html { font-size: 12px; background: transparent; }
        a { color: #fe9128; text-decoration: underline; cursor: pointer; }
        strong { color: #fe9128; }
        p { margin: 0; }
        p.indent { text-indent: 2em; }
        .dark { color: #858585; background: #212022; }
    </style>
    <script src="/static/js/jquery-1.8.3.min.js"></script>
</head>
<body>
<p>如果您是未成年人，请在家长监督下填写自己真实的身份证信息，根据国家新闻出版署发布的《关于防止未成年人沉迷网络游戏的通知》、《关于进一步严格管理 切实防止未成年人沉迷网络游戏的通知》，对您有以下限制：</p>
<p>游戏登录</p>
<p class="indent">（1）每周五、周六、周日和法定节假日每日20时至21时提供1小时网络游戏服务。</p>
<p>游戏充值</p>
<p class="indent">（1）未满8周岁的用户不得提供游戏充值服务。</p>
<p class="indent">（2）8周岁以上未满16周岁的用户，单次充值金额不得超过50元人民币，每月充值金额累计不得超过200元人民币。</p>
<p class="indent">（3）16周岁以上未满18周岁的用户，单次充值金额不得超过100元人民币，每月充值金额累计不得超过400元人民币。</p>
</body>
</html>
